name: Deploy KripHub to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    env:
      PAGES_ADMIN_PAT: ${{ secrets.PAGES_ADMIN_PAT }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_ENCRYPTED_MEDIA_BUCKET: ${{ secrets.EXPO_PUBLIC_ENCRYPTED_MEDIA_BUCKET }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Check Edge Function
        run: npm run check:edge

      - name: Export Expo web app
        run: npm run web:export

      - name: Ensure SPA fallback on GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Setup Pages (auto-enable with PAT)
        if: ${{ env.PAGES_ADMIN_PAT != '' }}
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ env.PAGES_ADMIN_PAT }}

      - name: Setup Pages (default token)
        if: ${{ env.PAGES_ADMIN_PAT == '' }}
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
